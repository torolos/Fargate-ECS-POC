name: Destroy AWS Infrastructure
on:
  workflow_dispatch:

env:  
    AWS_REGION: ${{ vars.AWS_REGION  || 'eu-west-1' }}

permissions:
  id-token: write
  contents: read

jobs:
  destroy-infrastructure:
    runs-on: ubuntu-latest
    steps:
        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
            aws-region: ${{ env.AWS_REGION }}
        
        - name: Set up NodeJS
          uses: actions/setup-node@v3
          with:
            node-version: '24.x'
            
        - name: Install CDK
          run: npm install -g aws-cdk
        
        - name: Delete Repositories
          run: |
            aws ecr delete-repository --repository-name fargate-ecs-poc-dotnet-app-repo --region ${{ env.AWS_REGION }} --force || echo "Repository not found, skipping"
            aws ecr delete-repository --repository-name fargate-ecs-poc-node-app-repo --region ${{ env.AWS_REGION }} --force || echo "Repository not found, skipping"
        
        - name: Delete CloudFormation Stack
          run: |
            cdk destroy InfrastructureStack --require-approval never --verbose || echo "InfrastructureStack not found or already deleted, skipping"
            cdk destroy NetworkStack --require-approval never --verbose || echo "NetworkStack not found or already deleted, skipping"